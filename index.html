<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CAI 2026 - FINAL PROFESIONAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #1a5276; --bg: #f4f6f7; --orange: #e67e22; --dark: #2c3e50; --green: #27ae60; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; font-size: 11px; }
        .header-app { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 20px; border-bottom: 4px solid var(--orange); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tabs { display: flex; background: #1c2833; padding: 10px 10px 0; gap: 4px; overflow-x: auto; }
        .tab { padding: 10px 15px; color: #bdc3c7; cursor: pointer; border-radius: 6px 6px 0 0; background: rgba(255,255,255,0.05); border: none; font-size: 10px; white-space: nowrap; }
        .tab.active { background: var(--bg); color: var(--p); font-weight: bold; }
        .tab.promedio-tab { border-bottom: 3px solid #3498db; color: #3498db; font-weight: bold; }
        .tab.asistencia-tab { border-bottom: 3px solid var(--green); color: var(--green); }
        .container { max-width: 1400px; margin: 15px auto; padding: 0 15px; }
        .table-card { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow-x: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #f8f9fa; padding: 12px 5px; border-bottom: 2px solid #dee2e6; color: var(--p); font-size: 9px; text-transform: uppercase; }
        td { padding: 8px 5px; border-bottom: 1px solid #eee; text-align: center; }
        .nota-input { width: 38px; padding: 5px; text-align: center; border: 1.5px solid #dcdde1; border-radius: 6px; font-weight: bold; }
        .btn { padding: 8px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 10px; }
        .btn-add { background: var(--p); color: white; }
        .btn-print { background: var(--green); color: white; }
        .btn-del { background: var(--red); color: white; padding: 5px 8px; border-radius: 4px; }
        .hidden { display: none !important; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        @media print {
            @page { margin: 0; }
            body { margin: 0; }
        }
    </style>
</head>
<body>

    <div id="login-screen" style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--dark);">
        <div class="login-box">
            <img src="https://i.ibb.co/Mkf051St/Logo-CAI.png" width="80">
            <h2 style="color:var(--p);">SISTEMA CAI 2026</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--orange); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">INGRESAR</button>
            <p id="error" style="color:red; font-size:10px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="header-app">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="https://i.ibb.co/Mkf051St/Logo-CAI.png" height="50">
                <div>
                    <b style="font-size:16px; color:var(--p);">CAI - Colegio Amigos de Israel (10398)</b><br>
                    <span id="txt-grado" style="font-weight:bold; color:var(--dark)">---</span> | 
                    <span id="txt-rol" style="color:var(--orange); font-weight:700; font-size:10px;">ROL: ---</span>
                </div>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <select id="sel-grado" onchange="cambiarGrado()" style="margin-bottom:0; width:180px;"></select>
                <button id="btn-boletas" onclick="generarBoletas()" class="btn btn-print hidden">📑 IMPRIMIR BOLETAS</button>
                <button onclick="location.reload()" class="btn" style="background:var(--red); color:white;">SALIR</button>
            </div>
        </div>

        <nav id="nav-tabs" class="tabs"></nav>

        <div class="container">
            <div id="panel-admin" class="panel-registro hidden" style="background:white; padding:15px; border-radius:10px; margin-bottom:15px; border-left: 5px solid var(--p);">
                <b style="color:var(--p)">REGISTRO DE MATRÍCULA:</b>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="reg-ape" placeholder="Apellidos" style="margin:0">
                    <input type="text" id="reg-nom" placeholder="Nombres" style="margin:0">
                    <input type="text" id="reg-nie" placeholder="NIE / Código" style="margin:0">
                    <button onclick="matricular()" class="btn btn-add">MATRICULAR</button>
                </div>
            </div>

            <div class="table-card">
                <table><thead><tr id="table-head"></tr></thead><tbody id="table-body"></tbody></table>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmw9CdeBr1Z11v0ye4af-WACBeCL5FDc4",
        authDomain: "academica-bcb50.firebaseapp.com",
        projectId: "academica-bcb50",
        databaseURL: "https://academica-bcb50-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const MATERIAS = {
        "K4": ["Inglés", "Biblia", "Informática", "Taller globalizador", "Taller de matemática", "Taller de expresión gráfica", "Taller de lectoescritura", "Taller de deporte"],
        "K5": ["Inglés", "Biblia", "Informática", "Taller globalizador", "Taller de expresión gráfica", "Taller de matemática", "Taller de lectoescritura", "Taller de deporte"],
        "K6": ["Inglés", "Biblia", "Informática", "Taller de conversación", "Taller de lectoescritura", "Taller de matemáticas", "Taller de desarrollo", "Educación emocional", "Taller de deporte", "Taller de arte", "Taller de expresión gráfica"],
        "1G": ["Taller de Ingles", "Taller Lenguaje", "Taller de Numeros", "Taller de Biblia", "Taller de cuerpo movimiento y bienestar", "Taller de Lectoescritura", "Taller de Finanzas", "Caligrafia", "Relaciones Sociales", "Exploracion y Experimentacion", "Estetica y Efectividad", "Taller de informatica"],
        "C1": ["Inglés", "Biblia", "Informática", "Finanzas", "Comunicación", "Números y formas", "Ciencia y tecnología", "Ciudadanía y valores", "Artes", "Desarrollo corporal"],
        "C2": ["Inglés", "Biblia", "Informática", "Finanzas", "Comunicación y literatura", "Aritmética y Finanzas", "Ciencia y tecnología", "Ciudadanía y valores", "Artes", "Desarrollo corporal"],
        "C3": ["Inglés", "Biblia", "Informática", "Finanzas", "Lengua y Literatura", "Matemática y datos", "Ciencia y tecnología", "Ciudadanía y valores", "Educación física"],
        "1B": ["Inglés", "Biblia", "Lenguaje y literatura", "Precalculo", "Ciencia y tecnología", "Ciudadanía y valores", "Educación física", "Proyecto de vida", "Finanzas y economia", "Ciencias de la computación"],
        "2B": ["Inglés", "Biblia", "Lenguaje y literatura", "Precalculo", "Ciencia y tecnología", "Ciudadanía y valores", "Educación física", "Orientacion para la vida", "Finanzas y economia", "Ciencias de la computación", "Seminario", "Curso de habilitacion laboral"]
    };

    const MESES_BASICA = ["Febrero", "Marzo", "Abril", "Primer Trimestre", "Mayo", "Junio", "Julio", "Segundo Trimestre", "Agosto", "Septiembre", "Octubre", "Tercer Trimestre"];
    const MESES_INFANCIA = ["Febrero", "Marzo", "Abril", "Trimestre 1", "Mayo", "Junio", "Julio", "Trimestre 2", "Agosto", "Septiembre", "Octubre", "Trimestre 3"];
    const MESES_B = ["Periodo 1 - Eval 1", "Periodo 1 - Eval 2", "RESUMEN T1", "Periodo 2 - Eval 1", "Periodo 2 - Eval 2", "RESUMEN T2", "Periodo 3 - Eval 1", "Periodo 3 - Eval 2", "RESUMEN T3"];

    const GRADOS_DATA = [
        {val:"K4", t:"Kinder 4 Años", cat:"infancia"}, {val:"K5", t:"Kinder 5 Años", cat:"infancia"}, {val:"K6", t:"Kinder 6 Años", cat:"infancia"}, {val:"1G", t:"1° Grado", cat:"infancia"},
        {val:"2G", t:"2° Grado", cat:"docente"}, {val:"3G", t:"3° Grado", cat:"docente"}, {val:"4G", t:"4° Grado", cat:"docente"},
        {val:"5G", t:"5° Grado", cat:"docente"}, {val:"6G", t:"6° Grado", cat:"docente"}, {val:"7G", t:"7° Grado", cat:"docente"},
        {val:"8G", t:"8° Grado", cat:"docente"}, {val:"9G", t:"9° Grado", cat:"docente"},
        {val:"1B", t:"1° Bachillerato", cat:"bachillerato"}, {val:"2B", t:"2° Bachillerato", cat:"bachillerato"}
    ];

    let currentRol = "", dataAlumnos = [], periodoActual = "", materiaVisualizada = "";

    function login() {
        const u = document.getElementById('user').value.toLowerCase(), p = document.getElementById('pass').value;
        if(u==='admin' && p==='admin2026') currentRol='admin';
        else if(u==='infancia' && p==='cai1') currentRol='infancia';
        else if(u==='docente' && p==='cai2') currentRol='docente';
        else if(u==='bachillerato' && p==='cai3') currentRol='bachillerato';
        if(currentRol) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('txt-rol').innerText = "ROL: " + currentRol.toUpperCase();
            if(currentRol==='admin') document.getElementById('panel-admin').classList.remove('hidden');
            cargarSelect();
        }
    }

    function cargarSelect() {
        let options = "";
        GRADOS_DATA.forEach(g => { if(currentRol==='admin' || currentRol===g.cat) options += `<option value="${g.val}">${g.t}</option>`; });
        document.getElementById('sel-grado').innerHTML = options;
        cambiarGrado(); escucharDB();
    }

    function getCiclo(g) {
        if(["K4","K5","K6","1G"].includes(g)) return g;
        if(["2G","3G"].includes(g)) return "C1";
        if(["4G","5G","6G"].includes(g)) return "C2";
        if(["7G","8G","9G"].includes(g)) return "C3";
        return g;
    }

    function cambiarGrado() {
        const g = document.getElementById('sel-grado').value, ciclo = getCiclo(g);
        let lista;
        if(ciclo.includes("B")) {
            lista = [...MESES_B];
        } else if(["K4","K5","K6","1G"].includes(ciclo)) {
            lista = [...MESES_INFANCIA];
        } else {
            lista = [...MESES_BASICA];
        }
        lista.push("Conducta y Asistencia");
        periodoActual = lista[0]; 
        materiaVisualizada = MATERIAS[ciclo][0];
        document.getElementById('txt-grado').innerText = document.getElementById('sel-grado').options[document.getElementById('sel-grado').selectedIndex].text;
        document.getElementById('nav-tabs').innerHTML = lista.map(p => {
            let cl = "tab";
            if(p.includes('Trimestre') || p.includes('RESUMEN')) cl += " promedio-tab";
            if(p === "Conducta y Asistencia") cl += " asistencia-tab";
            if(p === periodoActual) cl += " active";
            return `<button class="${cl}" onclick="setPeriodo('${p}', this)">${p}</button>`;
        }).join('');
        dibujar();
    }

    function setPeriodo(p, btn) { periodoActual = p; dibujar(); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); }

    function calcular(n, p, g) {
        const v = { t:parseFloat(n.t)||0, l:parseFloat(n.l)||0, lc:parseFloat(n.lc)||0, int:parseFloat(n.int)||0, ex:parseFloat(n.ex)||0 };
        const c = getCiclo(g);
        if(["K4","K5","K6","1G"].includes(c)) return parseFloat((v.t*0.5 + v.ex*0.5).toFixed(1));
        if(c.includes("B")) {
            if(p.includes("Eval 1")) return parseFloat(((v.t*0.25) + (v.l*0.20) + (v.lc*0.15) + (v.ex*0.40)).toFixed(1));
            return parseFloat(((v.t*0.10) + (v.l*0.05) + (v.lc*0.10) + (v.int*0.35) + (v.ex*0.40)).toFixed(1));
        }
        const esMesIntegrador = ["Abril", "Julio", "Octubre"].includes(p);
        if(esMesIntegrador) return parseFloat((v.t*0.1 + v.l*0.05 + v.lc*0.1 + v.int*0.35 + v.ex*0.4).toFixed(1));
        return parseFloat((v.t*0.25 + v.l*0.2 + v.lc*0.15 + v.ex*0.4).toFixed(1));
    }

    function dibujar() {
        const g = document.getElementById('sel-grado').value, ciclo = getCiclo(g), gTxt = document.getElementById('sel-grado').options[document.getElementById('sel-grado').selectedIndex].text;
        const isAdmin = currentRol === 'admin', esPromedio = periodoActual.includes("Trimestre") || periodoActual.includes("RESUMEN"), esAsistencia = periodoActual === "Conducta y Asistencia";
        const esInfancia = ["K4","K5","K6","1G"].includes(ciclo);
        const esBachillerato = ciclo.includes("B");

        if(esPromedio || esInfancia) document.getElementById('btn-boletas').classList.remove('hidden');
        else document.getElementById('btn-boletas').classList.add('hidden');

        let h = `${isAdmin?'<th>Elim</th>':''}<th>CÓDIGO</th><th>Apellidos</th><th>Nombres</th>`;
        if(esAsistencia) h += `<th>Periodo Ref.</th><th>Conducta</th><th>Tardes</th><th>Inasistencias</th><th>Observaciones</th>`;
        else {
            h += `<th style="width:150px">Materia</th>`;
            if(esPromedio) {
                if(esBachillerato) h += `<th>PERIOD 1</th><th>PERIOD 2</th><th>INT</th><th>PROM FINAL</th>`;
                else {
                    const tNum = periodoActual.slice(-1);
                    const meses = tNum=="1"?["FEB","MARZ","ABRIL"]:tNum=="2"?["MAYO","JUN","JUL"]:["AGOS","SEPT","OCT"];
                    h += `<th>${meses[0]}</th><th>${meses[1]}</th><th>${meses[2]} (INT)</th><th>PROM FINAL</th>`;
                }
            } else {
                // ACTIVACIÓN DE CASILLA INTEGRADORA:
                // - En Básica/C1-C3: Abril, Julio, Octubre
                // - En Bachillerato: Evaluaciones #2
                // - En Infancia (Kinder/1G): SOLO JULIO
                const showInt = (esInfancia && periodoActual === "Julio") || 
                                (!esInfancia && !esBachillerato && ["Abril", "Julio", "Octubre"].includes(periodoActual)) || 
                                (esBachillerato && periodoActual.includes("Eval 2"));

                if(esInfancia) h += `<th>T</th>${showInt?'<th>INT</th>':''}<th>E</th><th>PROM</th>`;
                else h += `<th>T</th><th>L</th><th>LC</th>${showInt?'<th>INT</th>':''}<th>E</th><th>PROM</th>`;
            }
        }
        document.getElementById('table-head').innerHTML = h;

        let fil = dataAlumnos.filter(a => a.grado === gTxt).sort((a,b) => a.ape.localeCompare(b.ape));
        let b = "";
        fil.forEach(al => {
            if(esAsistencia) {
                const perRef = "Abril";
                const cond = al.conducta?.[perRef] || "MB", as = al.asistencia?.[perRef] || { t:0, i:0 }, obs = al.observaciones?.[perRef] || "";
                b += `<tr>${isAdmin?`<td>-</td>`:''}<td>${al.nie}</td><td style="text-align:left">${al.ape}</td><td style="text-align:left">${al.nom}</td>
                    <td><select id="sel-per-ref-${al.id}" onchange="dibujar()"><option>Abril</option><option>Julio</option><option>Octubre</option></select></td>
                    <td><select onchange="db.ref('alumnos/${al.id}/conducta/'+document.getElementById('sel-per-ref-${al.id}').value).set(this.value)"><option ${cond==='B'?'selected':''}>B</option><option ${cond==='MB'?'selected':''}>MB</option><option ${cond==='E'?'selected':''}>E</option></select></td>
                    <td><input type="number" class="nota-input" value="${as.t}" onchange="db.ref('alumnos/${al.id}/asistencia/'+document.getElementById('sel-per-ref-${al.id}').value+'/t').set(this.value)"></td>
                    <td><input type="number" class="nota-input" value="${as.i}" onchange="db.ref('alumnos/${al.id}/asistencia/'+document.getElementById('sel-per-ref-${al.id}').value+'/i').set(this.value)"></td>
                    <td><input type="text" style="width:100%" value="${obs}" onchange="db.ref('alumnos/${al.id}/observaciones/'+document.getElementById('sel-per-ref-${al.id}').value).set(this.value)"></td></tr>`;
            } else if(esPromedio) {
                let p1, p2, p3, notaInt = 0;
                if(esBachillerato) {
                    const base = periodoActual.replace("RESUMEN T", "Periodo ");
                    const n1 = al.notas?.[`${base} - Eval 1`]?.[materiaVisualizada] || {}, n2 = al.notas?.[`${base} - Eval 2`]?.[materiaVisualizada] || {};
                    p1 = calcular(n1, `${base} - Eval 1`, g); p2 = calcular(n2, `${base} - Eval 2`, g); notaInt = n2.int || 0;
                    p3 = ((p1 + p2) / 2).toFixed(1);
                } else {
                    const tNum = periodoActual.slice(-1);
                    const meses = tNum=="1"?["Febrero","Marzo","Abril"]:tNum=="2"?["Mayo","Junio","Julio"]:["Agosto","Septiembre","Octubre"];
                    p1 = calcular(al.notas?.[meses[0]]?.[materiaVisualizada] || {}, meses[0], g);
                    p2 = calcular(al.notas?.[meses[1]]?.[materiaVisualizada] || {}, meses[1], g);
                    const n3 = al.notas?.[meses[2]]?.[materiaVisualizada] || {};
                    p3 = calcular(n3, meses[2], g); notaInt = n3.int || 0;
                    p3 = ((p1 + p2 + p3) / 3).toFixed(1);
                }
                b += `<tr>${isAdmin?`<td>-</td>`:''}<td>${al.nie}</td><td style="text-align:left">${al.ape}</td><td style="text-align:left">${al.nom}</td>
                    <td><select onchange="materiaVisualizada=this.value; dibujar()">${MATERIAS[ciclo].map(m=>`<option ${m===materiaVisualizada?'selected':''}>${m}</option>`).join('')}</select></td>
                    <td>${p1}</td><td>${p2}</td><td>${notaInt}</td><td style="font-weight:bold; background:#e8f4f8">${p3}</td></tr>`;
            } else {
                const n = al.notas?.[periodoActual]?.[materiaVisualizada] || {}, prom = calcular(n, periodoActual, g);
                const showInt = (esInfancia && periodoActual === "Julio") || 
                                (!esInfancia && !esBachillerato && ["Abril", "Julio", "Octubre"].includes(periodoActual)) || 
                                (esBachillerato && periodoActual.includes("Eval 2"));

                b += `<tr>${isAdmin?`<td><button onclick="eliminarAlumno('${al.id}')" class="btn btn-del">✖</button></td>`:''}
                    <td>${al.nie}</td><td style="text-align:left">${al.ape}</td><td style="text-align:left">${al.nom}</td>
                    <td><select onchange="materiaVisualizada=this.value; dibujar()">${MATERIAS[ciclo].map(m=>`<option ${m===materiaVisualizada?'selected':''}>${m}</option>`).join('')}</select></td>
                    <td><input type="text" class="nota-input" value="${n.t||0}" onchange="save('${al.id}','t',this.value)"></td>`;
                if(!esInfancia) {
                    b += `<td><input type="text" class="nota-input" value="${n.l||0}" onchange="save('${al.id}','l',this.value)"></td>
                          <td><input type="text" class="nota-input" value="${n.lc||0}" onchange="save('${al.id}','lc',this.value)"></td>`;
                }
                if(showInt) b += `<td><input type="text" class="nota-input" value="${n.int||0}" onchange="save('${al.id}','int',this.value)"></td>`;
                
                b += `<td><input type="text" class="nota-input" value="${n.ex||0}" onchange="save('${al.id}','ex',this.value)"></td><td style="font-weight:bold">${prom}</td></tr>`;
            }
        });
        document.getElementById('table-body').innerHTML = b;
    }

    function save(id, c, v) { db.ref(`alumnos/${id}/notas/${periodoActual}/${materiaVisualizada}/${c}`).set(parseFloat(v) || 0); }
    function matricular() {
        const n = { nie: document.getElementById('reg-nie').value, ape: document.getElementById('reg-ape').value.toUpperCase(), nom: document.getElementById('reg-nom').value.toUpperCase(), grado: document.getElementById('sel-grado').options[document.getElementById('sel-grado').selectedIndex].text };
        db.ref('alumnos').push(n).then(()=>alert("Matriculado"));
    }
    function eliminarAlumno(id) { if(confirm("¿Eliminar?")) db.ref('alumnos/'+id).remove(); }
    function escucharDB() { db.ref('alumnos').on('value', snap => { const v = snap.val(); dataAlumnos = v ? Object.keys(v).map(k=>({id:k, ...v[k]})) : []; dibujar(); }); }

    function generarBoletas() {
        const val = document.getElementById('sel-grado').value, ciclo = getCiclo(val), gTxt = document.getElementById('sel-grado').options[document.getElementById('sel-grado').selectedIndex].text;
        const alumnos = dataAlumnos.filter(a => a.grado === gTxt).sort((a,b) => a.ape.localeCompare(b.ape));
        let tNum = periodoActual.includes("1") || periodoActual.includes("Primer") ? "1" : periodoActual.includes("2") || periodoActual.includes("Segundo") ? "2" : "3";
        const labelBoleta = "TRIMESTRE " + tNum;

        let win = window.open('', '_blank');
        let h = `<html><head><style>
            @media print { @page { margin: 0; } body { margin: 1cm; } }
            body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
            .boleta { min-height: 48vh; padding: 10mm; border-bottom: 2px dashed #1a5276; box-sizing: border-box; page-break-inside: avoid; }
            .header { display: flex; align-items: center; border-bottom: 3px solid #e67e22; margin-bottom: 5px; padding-bottom: 5px; }
            .info { display: grid; grid-template-columns: 2fr 1fr 1fr; background: #1a5276; color: white; padding: 8px; font-weight: bold; font-size: 10px; border-radius: 5px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th { background: #f2f4f4; color: #1a5276; padding: 6px; border: 1px solid #ccc; font-size: 9px; }
            td { border: 1px solid #ccc; padding: 5px; text-align: center; font-size: 10px; }
            .prom-cell { background: #ebf5fb; font-weight: bold; color: #1a5276; }
            .firma-box { display: flex; justify-content: space-between; margin-top: 30px; }
            .firma { border-top: 1px solid #000; width: 220px; text-align: center; padding-top: 5px; font-weight: bold; font-size: 9px; }
        </style></head><body>`;

        alumnos.forEach((al, idx) => {
            const mesesAsis = tNum=="1"?"Abril":tNum=="2"?"Julio":"Octubre";
            const as = al.asistencia?.[mesesAsis] || { t:0, i:0 }, cond = al.conducta?.[mesesAsis] || "MB";
            h += `<div class="boleta">
                <div class="header"><img src="https://i.ibb.co/Mkf051St/Logo-CAI.png" height="40"> <div style="margin-left:20px;"><h2 style="margin:0; color:#1a5276; font-size:14px;">CAI - COLEGIO AMIGOS DE ISRAEL</h2><small style="color:#e67e22; font-weight:bold;">${labelBoleta}</small></div></div>
                <div class="info"><div>ALUMNO: ${al.ape} ${al.nom}</div><div>GRADO: ${gTxt}</div><div>CÓDIGO: ${al.nie}</div></div>
                <table><thead><tr><th style="text-align:left">MATERIA</th>`;
            const mesesLabel = tNum=="1"?["FEB","MARZ","ABRIL"]:tNum=="2"?["MAYO","JUN","JUL"]:["AGOS","SEPT","OCT"];
            h += `<th>${mesesLabel[0]}</th><th>${mesesLabel[1]}</th><th>${mesesLabel[2]} (INT)</th><th>PROM FINAL</th></tr></thead><tbody>`;

            MATERIAS[ciclo].forEach(m => {
                let p1, p2, p3, notaInt = 0;
                if(ciclo.includes("B")) {
                    const base = "Periodo " + tNum;
                    const n1 = al.notas?.[`${base} - Eval 1`]?.[m] || {}, n2 = al.notas?.[`${base} - Eval 2`]?.[m] || {};
                    p1 = calcular(n1, `${base} - Eval 1`, val); p2 = calcular(n2, `${base} - Eval 2`, val); notaInt = n2.int || 0;
                    p3 = ((p1 + p2) / 2).toFixed(1);
                } else {
                    const meses = tNum=="1"?["Febrero","Marzo","Abril"]:tNum=="2"?["Mayo","Junio","Julio"]:["Agosto","Septiembre","Octubre"];
                    p1 = calcular(al.notas?.[meses[0]]?.[m] || {}, meses[0], val);
                    p2 = calcular(al.notas?.[meses[1]]?.[m] || {}, meses[1], val);
                    const n3 = al.notas?.[meses[2]]?.[m] || {};
                    p3 = calcular(n3, meses[2], val); notaInt = n3.int || 0;
                    p3 = ((p1 + p2 + p3) / 3).toFixed(1);
                }
                h += `<tr><td style="text-align:left; font-weight:bold;">${m}</td><td>${p1}</td><td>${p2}</td><td>${notaInt}</td><td class="prom-cell">${p3}</td></tr>`;
            });

            h += `</tbody></table>
                <div style="font-size:9px; margin-top:8px;"><b>CONDUCTA:</b> ${cond} | <b>TARDES:</b> ${as.t} | <b>INASISTENCIAS:</b> ${as.i}</div>
                <div class="firma-box"><div class="firma">FIRMA DOCENTE</div><div class="firma">Rhina Elena Linares de Barahona<br>DIRECTORA</div></div>
            </div>`;
            if((idx+1)%2===0) h += `<div style="page-break-after:always;"></div>`;
        });
        win.document.write(h + "</body></html>"); win.document.close();
        win.onload = function() { win.print(); };
    }
</script>
</body>
</html>
